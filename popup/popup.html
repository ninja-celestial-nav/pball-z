<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FunNow Premium</title>
  <style>
    :root {
      --funnow-orange: #FF6B00;
      --accent-gradient: linear-gradient(135deg, #FF6B00, #FF006B);
    }
    body {
      width: 280px;
      margin: 0;
      padding: 16px;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #1a1a1a;
      color: white;
      text-align: center;
    }
    .header {
      font-weight: 800;
      font-size: 1.25rem;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
    }
    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 22px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(255, 255, 255, 0.2);
      transition: .4s;
      border-radius: 24px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 16px; width: 16px;
      left: 3px; bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider { background: var(--accent-gradient); }
    input:checked + .slider:before { transform: translateX(18px); }
    
    .status {
      font-size: 11px;
      color: #666;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="header">FunNow PREMIUM</div>
  
  <div class="card">
    <span>Force Prepay</span>
    <label class="switch">
      <input type="checkbox" id="forcePrepay">
      <span class="slider"></span>
    </label>
  </div>

  <div class="card">
    <span>Auto Confirm</span>
    <label class="switch">
      <input type="checkbox" id="autoConfirm">
      <span class="slider"></span>
    </label>
  </div>

  <div class="card">
    <span>Premium UI</span>
    <label class="switch">
      <input type="checkbox" id="premiumUI">
      <span class="slider"></span>
    </label>
  </div>

  <div class="status">Extension Active • Glassmorphism v1.0</div>

  <script src="popup.js"></script>
</body>
</html>
